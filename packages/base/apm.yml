# yaml-language-server: $schema=https://microsoft.github.io/apm/specs/schemas/manifest-v0.1.schema.json
# Base-Paket — gilt für ALLE Repos.
# Globale Skills, Hooks, Instructions, Agents und Prompts liegen unter .apm/.
name: base
version: 1.0.0
dependencies:
  apm:
    - figma/mcp-server-guide
  # Direkt deklarierte MCP-Server (kein Registry-Lookup): durch transport+url
  # bzw. transport+command definiert. KEIN `registry`-Feld setzen — APM würde
  # dessen Wert sonst als Registry-URL interpretieren und scheitern.
  mcp:
    - name: context7
      transport: http
      url: https://mcp.context7.com/mcp

    - name: atlassian
      transport: http
      url: https://mcp.atlassian.com/v1/mcp/authv2

    - name: figma
      transport: http
      url: https://mcp.figma.com/mcp

    - name: codegraph
      transport: stdio
      command: codegraph
      args:
        - serve
        - --mcp
