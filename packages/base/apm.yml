# yaml-language-server: $schema=https://microsoft.github.io/apm/specs/schemas/manifest-v0.1.schema.json
# Base-Paket — gilt für ALLE Repos.
# Globale Skills, Hooks, Instructions, Agents und Prompts liegen unter .apm/.
name: base
version: 1.0.0
dependencies:
  apm:
    - figma/mcp-server-guide
  mcp:
    - name: context7
      registry: "false"
      transport: http
      url: https://mcp.context7.com/mcp

    - name: atlassian
      registry: "false"
      transport: http
      url: https://mcp.atlassian.com/v1/mcp/authv2

    - name: figma
      registry: "false"
      transport: http
      url: https://mcp.figma.com/mcp

    - name: codegraph
      registry: "false"
      transport: stdio
      command: codegraph
      args:
        - serve
        - --mcp
