# yaml-language-server: $schema=https://microsoft.github.io/apm/specs/schemas/manifest-v0.1.schema.json
# Base-Paket — gilt für ALLE Repos.
# Globale Skills, Hooks, Instructions, Agents und Prompts liegen unter .apm/.
name: base
version: 1.0.0
dependencies:
  apm: []
  mcp:
    # CodeGraph MCP-Server — lokaler stdio-Prozess (codegraph serve --mcp).
    # registry MUSS Boolean false sein (markiert self-defined). Nicht quoten!
    # 'false' (String) bricht die transitive Auflösung ("Invalid MCP registry URL").
    - name: codegraph
      registry: false
      transport: stdio
      command: codegraph
      args: ["serve", "--mcp"]
